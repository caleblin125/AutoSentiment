[tool.ruff]
target-version = "py312"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line too long (handled by formatter)
    "B008", # do not perform function calls in argument defaults
]

[format]
quote-style = "double"
indent-style = "space"

[lint.per-file-ignores]
"tests/*.py" = ["N806", "N802", "N803", "S101"]
"__init__.py" = ["F401"]
